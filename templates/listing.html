<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Объявление - Livento</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav>
    <a href="/" class="nav-logo">🏠 Livento</a>
    <div class="nav-links" id="nav-links"></div>
</nav>

<div class="container">
    <a href="/" class="back-link">← Назад к списку</a>
    <div id="content"><div class="loading">Загружаем...</div></div>
</div>

<div id="toast" class="toast"></div>

<script src="/static/js/main.js"></script>
<script>
    updateNav();

    const params = new URLSearchParams(location.search);
    const listingId = params.get('id');

    if (!listingId) location.href = '/';

    async function loadListing() {
        try {
            const l = await request(`${API}/listings/${listingId}/`);
            document.title = `${l.title} - Livento`;

            let avgRating = '';
            try {
                const reviewsData = await request(`${API}/reviews/${listingId}/reviews/`);
                const reviews = reviewsData.results || reviewsData;
                if (reviews.length) {
                    const avg = reviews.reduce((s, r) => s + r.rating, 0) / reviews.length;
                    avgRating = `★ ${avg.toFixed(1)} (${reviews.length} отзывов)`;
                }
            } catch(e) {}

            document.getElementById('content').innerHTML = `
                <div class="detail-grid">
                    <div>
                        <div class="detail-img">${listingImageHtml(l)}</div>
                        <div class="detail-title">${l.title}</div>
                        <div class="detail-location">
                            📍 ${l.city}${l.district ? ', ' + l.district : ''}
                            ${l.address ? ' · ' + l.address : ''}
                            ${avgRating ? ' · ' + avgRating : ''}
                        </div>

                        <div class="detail-stats">
                            <div class="stat">
                                <div class="stat-value">${l.rooms}</div>
                                <div class="stat-label">комнат</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">€${l.price_per_night}</div>
                                <div class="stat-label">за ночь</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${l.views_count || 0}</div>
                                <div class="stat-label">просмотров</div>
                            </div>
                        </div>

                        <p class="detail-description">${l.description}</p>

                        <div style="display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap;">
                            <span class="badge badge-type">${l.property_type}</span>
                            <span class="badge">👤 ${l.owner?.username || 'Арендодатель'}</span>
                            ${bookedBadgeHtml(l)}
                        </div>

                        <div class="reviews-section" id="reviews-section">
                            <h3 style="font-size:18px; margin-bottom:16px;">Отзывы</h3>
                            <div id="review-form-container"></div>
                            <div id="reviews-list"><div class="loading">Загружаем отзывы...</div></div>
                        </div>
                    </div>

                    <div>
                        <div class="booking-card">
                            <h3>Забронировать</h3>
                            <div class="price">€${l.price_per_night} <span>/ ночь</span></div>

                            <div class="form-group">
                                <label>Дата заезда</label>
                                <input type="date" id="date-from" onchange="calcTotal()">
                            </div>
                            <div class="form-group">
                                <label>Дата выезда</label>
                                <input type="date" id="date-to" onchange="calcTotal()">
                            </div>

                            <div class="total-price" id="total-block" style="display:none">
                                <span id="nights-label">0 ночей</span>
                                <strong id="total-label">€0</strong>
                            </div>

                            <button class="btn btn-primary" style="width:100%" onclick="book()">
                                Забронировать
                            </button>

                            <p style="text-align:center; font-size:12px; color:#aaa; margin-top:12px;">
                                Оплата при заезде
                            </p>
                        </div>
                    </div>
                </div>
            `;

            loadReviews(l);
            loadReviewForm();
            setMinDates();
            window._listing = l;

        } catch(e) {
            document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Объявление не найдено</p></div>';
        }
    }

    async function loadReviews(listing) {
        const user = getUser();
        const isOwner = user && listing.owner && user.email === listing.owner.email;

        try {
            const data = await request(`${API}/reviews/${listingId}/reviews/`);
            const reviews = data.results || data;
            const list = document.getElementById('reviews-list');

            if (!reviews.length) {
                list.innerHTML = '<p style="color:#888; font-size:14px;">Отзывов пока нет</p>';
                return;
            }

            list.innerHTML = reviews.map(r => `
                <div class="review-card">
                    <div class="review-header">
                        <span class="review-author">${r.author_email?.split('@')[0] || 'Пользователь'}</span>
                        <span class="stars">${stars(r.rating)}</span>
                    </div>
                    ${r.comment ? `<p class="review-text">${r.comment}</p>` : ''}

                    ${r.landlord_reply ? `
                        <div style="background:#f0f9f8; border-left:3px solid #14b8a6; border-radius:6px; padding:10px 12px; margin-top:10px;">
                            <div style="font-size:12px; font-weight:600; color:#0d9488; margin-bottom:4px;">Ответ арендодателя</div>
                            <div style="font-size:13px; color:#444;">${r.landlord_reply}</div>
                        </div>
                    ` : (isOwner ? `
                        <div style="margin-top:10px;">
                            <button class="btn btn-secondary" style="font-size:12px; padding:4px 10px;" onclick="showReplyForm(${r.id})">
                                Ответить на отзыв
                            </button>
                            <div id="reply-form-${r.id}" style="display:none; margin-top:8px;">
                                <input type="text" id="reply-input-${r.id}" placeholder="Ваш ответ..." style="width:100%; border:1px solid #e0e0e0; border-radius:6px; padding:8px 10px; font-size:13px; margin-bottom:6px;">
                                <button class="btn btn-primary" style="font-size:12px; padding:4px 10px;" onclick="submitReply(${r.id})">Отправить</button>
                            </div>
                        </div>
                    ` : '')}
                </div>
            `).join('');
        } catch(e) {}
    }

    function showReplyForm(reviewId) {
        const form = document.getElementById(`reply-form-${reviewId}`);
        if (form) form.style.display = 'block';
    }

    async function submitReply(reviewId) {
        const input = document.getElementById(`reply-input-${reviewId}`);
        const reply = input.value.trim();
        if (!reply) { toast('Введите текст ответа', 'error'); return; }

        try {
            await request(`${API}/reviews/${listingId}/reviews/${reviewId}/reply/`, 'POST', { reply });
            toast('Ответ добавлен', 'success');
            const l = window._listing;
            loadReviews(l);
        } catch(e) {
            toast(extractErrorMessage(e, 'Не удалось отправить ответ'), 'error');
        }
    }

    // раньше отзыв требовал чтобы дата выезда УЖЕ ПРОШЛА, но через интерфейс нельзя
    // выбрать прошедшую дату при бронировании - отзыв было физически невозможно оставить.
    // теперь достаточно чтобы бронирование было подтверждено
    async function loadReviewForm() {
        const user = getUser();
        const container = document.getElementById('review-form-container');
        if (!user || user.role !== 'tenant') return;

        try {
            const data = await request(`${API}/bookings/`);
            const bookings = data.results || data;

            const eligible = bookings.find(b =>
                String(b.listing) === String(listingId) &&
                b.status === 'confirmed' &&
                !b.has_review
            );

            if (!eligible) return;

            container.innerHTML = `
                <div style="background:#f9f9f9; border-radius:10px; padding:16px; margin-bottom:16px;">
                    <div style="font-weight:600; margin-bottom:10px; font-size:14px;">Оставить отзыв</div>
                    <div class="form-group">
                        <label>Оценка</label>
                        <select id="review-rating">
                            <option value="5">★★★★★ Отлично</option>
                            <option value="4">★★★★☆ Хорошо</option>
                            <option value="3">★★★☆☆ Нормально</option>
                            <option value="2">★★☆☆☆ Плохо</option>
                            <option value="1">★☆☆☆☆ Ужасно</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Комментарий (необязательно)</label>
                        <input type="text" id="review-comment" placeholder="Поделитесь впечатлениями">
                    </div>
                    <button class="btn btn-primary" onclick="submitReview(${eligible.id})">Отправить отзыв</button>
                </div>
            `;
        } catch(e) {}
    }

    async function submitReview(bookingId) {
        const rating = document.getElementById('review-rating').value;
        const comment = document.getElementById('review-comment').value.trim();

        try {
            await request(`${API}/reviews/${listingId}/reviews/`, 'POST', {
                booking: bookingId,
                rating: Number(rating),
                comment,
            });
            toast('Отзыв добавлен, спасибо!', 'success');
            document.getElementById('review-form-container').innerHTML = '';
            loadReviews(window._listing);
        } catch(e) {
            toast(extractErrorMessage(e, 'Не удалось отправить отзыв'), 'error');
        }
    }

    function setMinDates() {
        const today = new Date().toISOString().split('T')[0];
        const df = document.getElementById('date-from');
        const dt = document.getElementById('date-to');
        if (df) df.min = today;
        if (dt) dt.min = today;
    }

    function calcTotal() {
        const df = document.getElementById('date-from')?.value;
        const dt = document.getElementById('date-to')?.value;
        const block = document.getElementById('total-block');

        if (!df || !dt || !window._listing) { block.style.display = 'none'; return; }

        const days = Math.round((new Date(dt) - new Date(df)) / 86400000);
        if (days <= 0) { block.style.display = 'none'; return; }

        const total = days * parseFloat(window._listing.price_per_night);
        block.style.display = 'flex';
        document.getElementById('nights-label').textContent = `${days} ночей`;
        document.getElementById('total-label').textContent = `€${total.toFixed(2)}`;
    }

    async function book() {
        const user = getUser();
        if (!user) {
            toast('Войдите чтобы забронировать', 'error');
            setTimeout(() => location.href = '/auth/', 1500);
            return;
        }

        if (user.role !== 'tenant') {
            toast('Только арендаторы могут бронировать', 'error');
            return;
        }

        const dateFrom = document.getElementById('date-from')?.value;
        const dateTo = document.getElementById('date-to')?.value;

        if (!dateFrom || !dateTo) {
            toast('Выберите даты', 'error');
            return;
        }

        // пункт 3: проверяем занятость дат ДО отправки - сразу понятное сообщение,
        // а не общая ошибка после клика
        const available = await checkDatesAvailable(listingId, dateFrom, dateTo);
        if (!available) {
            toast('Эти даты уже забронированы - выберите другие', 'error');
            return;
        }

        try {
            await request(`${API}/bookings/`, 'POST', {
                listing: listingId,
                date_from: dateFrom,
                date_to: dateTo,
            });
            toast('Бронирование создано! Ожидайте подтверждения.', 'success');
        } catch(e) {
            toast(extractErrorMessage(e, 'Ошибка при бронировании'), 'error');
        }
    }

    loadListing();
</script>
</body>
</html>
